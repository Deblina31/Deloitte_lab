<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <h1>A Simple Contact Form</h1>
    <button id="themeToggle">Switch Theme</button>
</header>

    <section id="contact-info">
        <fieldset>
            <legend>
                <h2>Contact Information</h2>
            </legend>
                <form action="">
                    <label for="fullname"> Full Name:</label>
                    <input type="text" id="fullname" placeholder="John Doe" /> <br><br>
                    
                    <label for="emailId"> Email:</label>
                    <input type="email" id="emailId" placeholder="john.doe@example.com" /> <br><br>
                    
                    <label for="phonenumber"> Phone Number:</label>
                    <input type="tel" pattern="[0-9]{10}" id="phonenumber" placeholder="1234567890" />
                    <small>Format:1234567890 (10 Digits)</small>
                    <br><br>
                    
                    <label for="age"> Age:</label>
                    <input type="number" id="age" placeholder="age" /> <br><br>
                    
                    <label for="city"> City:</label>
                    <select name="city" id="city">
                        <option value="">--Please Choose a City--</option>
                        <option value="Kolkata">Kolkata</option>
                        <option value="Bangalore">Bangalore</option>
                        <option value="Delhi">Delhi</option>
                        <option value="Pune">Pune</option>
                    </select>
                    <br><br>

                    <label for="states">State</label>
                    <input list="state" name="state">
                    <datalist id="state">
                        <option value="Kolkata">Kolkata</option>
                        <option value="Bangalore">Bangalore</option>
                        <option value="Delhi">Delhi</option>
                        <option value="Pune">Pune</option>
                    </datalist>
                    <br><br>

                <div role="radiogroup" aria-labelledby="group-label">
                    <label id="group-label"> Gender:</label> <br><br>
                    <label for="male"> Male</label>
                    <input type="radio" name="gender" id="male" value="male">
                    
                    <label for="female"> Female</label>
                    <input role="radio" type="radio" name="gender" id="female" value="female">
                    </div>
                    <br><br>
                   
                    <label for="profile-pic">Profile Picture:</label>
                    <input type="file" name="profile-pic" id="profile-pic" accept="image/*"
                    capture="enviorment">
                    <br><br>

                    <button type="submit">Send</button>
                    <button type="reset">Reset</button>
                </form>   
        </fieldset>
    </section>
    <script src="script.js"></script>
</body>
</html>
